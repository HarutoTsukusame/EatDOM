<!DOCTYPE html>
<html>

<head>
	<title>EatDOM</title>
	<script src="index.js" type="module"></script>
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<meta property="og:title" content="EatDOM" />
	<meta property="og:description" content="EatDOMは、JSだけでHTMLライクに記述できる超軽量DOMビルダーです。" />
	<meta property="og:url" content="https://hirameki-no-kirameki.com/eatdom/" />
	<meta name="twitter:card" content="summary" />
	<style>
		*,
		*::before,
		*::after {
			box-sizing: border-box;
		}

		html {
			scrollbar-gutter: stable;
			background-color: #036;
			color: #036;
		}

		body {
			border: thin solid #fed;
			background-color: #fed;
			max-width: 63rem;
			margin: 0 auto;
			padding: 0 1rem;
		}

		h1,
		h2,
		h3,
		h4,
		h5,
		h6 {
			/* border-bottom: thin solid #036; */
			margin: 1rem 0;
		}

		table {
			border: 1px solid black;
		}

		th,
		td {
			border: 1px solid black;
			text-align: center;
		}

		section {
			padding: 0;
		}

		ul {
			padding-inline-start: 1.5rem;
		}

		ol.code {
			border: 1px solid #036;
			font-family: monospace;
			line-height: 150%;
			width: stretch;
			overflow: auto;

			>li {
				border-left: 1px solid #036;
				padding-left: 0.5rem;
				white-space: pre;
				tab-size: 2;
			}
		}

		.main {
			min-width: 0;
			width: stretch;
		}

		menu {
			width: stretch;
			display: flex;
			flex-wrap: wrap;
			/* grid-template-columns: repeat(auto-fit, minmax(10rem, 1fr)); */
			list-style-type: none;
			margin: 1rem 0;
			padding: 0;
			align-content: start;
			gap: 1rem;

			li {
				display: block;
				flex-grow: 1;

				a {
					display: block;
					border: thin solid #036;
					text-align: center;
					height: stretch;
					padding: 0.5rem;
				}

				a:hover {
					color: #fed;
					background-color: #036;
				}
			}

		}

		.life-game {
			width: stretch;
			display: grid;
			aspect-ratio: 1;

			div.life-game-cell-black {
				background-color: black;
			}

			div.life-game-cell-white {
				background-color: white;
			}
		}

		textarea.tool-md2html,
		textarea.tool-html2eatdom,
		textarea.tool-base64,
		textarea.multi-line-stretch {
			width: stretch;
			height: 15rem;
		}
	</style>
</head>

<body>
	<div id="root"></div>
</body>

</html>
